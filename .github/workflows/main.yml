name: Build(Windows-2022) on Push

on:
  push:
    branches:
      - master
  workflow_dispatch:
  
jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore dependencies
        run: dotnet restore ./GameCalc.slnx

      - name: Build solution
        run: dotnet build ./GameCalc.slnx --configuration Release --no-restore
